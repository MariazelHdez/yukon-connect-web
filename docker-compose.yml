services:
  postgres:
    image: postgres:18-alpine
    container_name: yukon-connect-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-yukon_connect}"
      POSTGRES_USER: "${POSTGRES_USER:-yukon}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-change-me-in-local-env}"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: yukon-connect-pgadmin
    restart: unless-stopped
    profiles:
      - tools
    environment:
      PGADMIN_DEFAULT_EMAIL: "${PGADMIN_DEFAULT_EMAIL:-admin@example.com}"
      PGADMIN_DEFAULT_PASSWORD: "${PGADMIN_DEFAULT_PASSWORD:-change-me-in-local-env}"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

  api:
    image: node:24-alpine
    container_name: yukon-connect-api
    profiles:
      - apps
    working_dir: /workspace
    command: ["sh", "-c", "echo 'API service placeholder: scaffold apps/api before enabling this profile.' && sleep infinity"]
    environment:
      DATABASE_URL: "${DATABASE_URL:-postgresql://yukon:change-me-in-local-env@postgres:5432/yukon_connect}"
      API_PORT: "${API_PORT:-3001}"
    ports:
      - "${API_PORT:-3001}:${API_PORT:-3001}"
    volumes:
      - .:/workspace
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: node:24-alpine
    container_name: yukon-connect-frontend
    profiles:
      - apps
    working_dir: /workspace
    command: ["sh", "-c", "echo 'Frontend service placeholder: scaffold apps/frontend before enabling this profile.' && sleep infinity"]
    environment:
      FRONTEND_PORT: "${FRONTEND_PORT:-3000}"
    ports:
      - "${FRONTEND_PORT:-3000}:${FRONTEND_PORT:-3000}"
    volumes:
      - .:/workspace

  strapi:
    image: node:24-alpine
    container_name: yukon-connect-strapi
    profiles:
      - apps
    working_dir: /workspace
    command: ["sh", "-c", "echo 'Strapi service placeholder: scaffold apps/strapi before enabling this profile.' && sleep infinity"]
    environment:
      STRAPI_DATABASE_URL: "${STRAPI_DATABASE_URL:-postgresql://yukon:change-me-in-local-env@postgres:5432/yukon_connect}"
    ports:
      - "1337:1337"
    volumes:
      - .:/workspace
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  pgadmin_data:
